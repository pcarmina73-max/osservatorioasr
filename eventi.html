  <section id="eventi" class="rassegna-sec" aria-label="Eventi">
    <ul class="elenco" id="lista-eventi"></ul>
  </section>

<script src="comune.js"></script>
<script>
scheletro("eventi.html","Eventi","Convegni, seminari, webinar e incontri pubblici dedicati all'Accordo. I prossimi appuntamenti in cima.");
let CONTENUTI=[];
caricaDati().then(d=>{
  CONTENUTI=(d.contenuti||[]).filter(c=>c.approvato);
  segnaAggiornamento(d.meta);
  riempi("lista-eventi", CONTENUTI.filter(c=>c.tipo==="evento"), true);
}).catch(()=>{erroreDati(); segnaAggiornamento();});
</script>
