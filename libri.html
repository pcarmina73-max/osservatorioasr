<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Libri sull'Accordo Stato-Regioni formazione sicurezza | OsservatorioASR.it</title>
<meta name="description" content="Volumi e guide operative dedicati all'Accordo Stato-Regioni 59/CSR sulla formazione in salute e sicurezza sul lavoro.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@300;400;600;700;900&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

</head>
<body>
<main class="wrap">
  <section id="libri" class="rassegna-sec" aria-label="Libri">
    <ul class="elenco" id="lista-libri"></ul>
  </section>
</main>
<script src="comune.js"></script>
<script>
scheletro("libri.html","Libri","Volumi e guide dedicati all'Accordo, individuati automaticamente e selezionati manualmente.");
let CONTENUTI=[];
caricaDati().then(d=>{
  CONTENUTI=(d.contenuti||[]).filter(c=>c.approvato);
  segnaAggiornamento(d.meta);
  const perData=(a,b)=>parseData(b.data||"01/01/1970")-parseData(a.data||"01/01/1970");
  riempi("lista-libri", CONTENUTI.filter(c=>c.tipo==="libro").sort(perData));
}).catch(()=>{erroreDati(); segnaAggiornamento();});
</script>
</body>
</html>
